name: Electron Build

permissions:
  "contents": "write"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          npm ci
      - name: Build executable
        run: |
          npm run build
      - name: Copy additional files
        shell: bash
        run: |
          cp -R frontend dist/frontend
          cp example.env dist/.env
      - name: Compress archive (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          $files = Get-ChildItem ./dist -Recurse -File | Where-Object {
            $_.FullName -notmatch '-unpacked\\'
          }
          Compress-Archive -Path $files.FullName -DestinationPath Stagetimer-${{ matrix.os }}.zip
      - name: Compress archive (Ubuntu and Mac)
        if: startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'macos')
        run: |
          cd dist
          zip -r Stagetimer-${{ matrix.os }}.zip . -x '*-unpacked/*'
      - name: Upload artifact (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: Stagetimer-Windows
          path: Stagetimer-windows-latest.zip
      - name: Upload artifact (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: Stagetimer-Linux
          path: Stagetimer-ubuntu-latest.zip
      - name: Upload artifact (Mac)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: Stagetimer-Mac
          path: Stagetimer-macos-latest.zip
  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code
      - uses: actions/download-artifact@v8
        name: Download Windows
        with:
          name: Stagetimer-Windows
          path: release-artifacts/
      - name: Rename Windows archive
        run: |
          mv release-artifacts/Stagetimer-windows-latest.zip release-artifacts/Stagetimer-Windows.zip
      - uses: actions/download-artifact@v8
        name: Download Linux
        with:
          name: Stagetimer-Linux
          path: release-artifacts/
      - name: Rename Linux archive
        run: |
          mv release-artifacts/Stagetimer-ubuntu-latest.zip release-artifacts/Stagetimer-Linux.zip
      - uses: actions/download-artifact@v8
        name: Download Mac
        with:
          name: Stagetimer-Mac
          path: release-artifacts/
      - name: Rename Mac archive
        run: |
          mv release-artifacts/Stagetimer-macos-latest.zip release-artifacts/Stagetimer-Mac.zip
      - name: Create release
        uses: ncipollo/release-action@v1.21.0
        with:
          replacesArtifacts: true
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "release-artifacts/*"
          body: ${{ github.event.head_commit.message }}
          prerelease: true
          name: Nightly Release
          tag: nightly-build
      - name: Update nightly-build tag
        run: |
          git tag -f nightly-build
          git push -f origin nightly-build
        shell: bash
